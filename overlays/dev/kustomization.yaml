apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Pin all image versions for dev
images:
  - name: ghcr.io/nixbug/entebus-server
    newTag: develop
  - name: postgis/postgis
    newTag: "18-3.6-alpine"
  - name: redis
    newTag: "8.6.3-alpine"
  - name: minio/minio
    newTag: RELEASE.2025-09-07T16-13-09Z
  - name: public.ecr.aws/zinclabs/openobserve
    newTag: v0.80.3

patches:
  # Label the namespace as dev
  - target:
      kind: Namespace
      name: entebus
    patch: |-
      - op: replace
        path: /metadata/labels/environment
        value: dev

  # Rewrite all ingress hostnames to dev-* subdomains
  - target:
      kind: Ingress
      name: entebus-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev-api.entebus.com
      - op: replace
        path: /spec/tls/1/hosts/0
        value: dev-minio.entebus.com
      - op: replace
        path: /spec/tls/2/hosts/0
        value: dev-openobserve.entebus.com
      - op: replace
        path: /spec/rules/0/host
        value: dev-api.entebus.com
      - op: replace
        path: /spec/rules/1/host
        value: dev-minio.entebus.com
      - op: replace
        path: /spec/rules/2/host
        value: dev-openobserve.entebus.com

  # Always pull the latest develop image in dev
  - target:
      kind: HorizontalPodAutoscaler
      name: entebus-server
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

  - target:
      kind: Deployment
      name: entebus-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
