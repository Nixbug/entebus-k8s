apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Pin all image versions for production
# Replace 'latest' tags with specific immutable versions before deploying
images:
  - name: ghcr.io/nixbug/entebus-server
    newTag: latest
  - name: postgis/postgis
    newTag: "18-3.6-alpine"
  - name: redis
    newTag: "8.6.3-alpine"
  - name: minio/minio
    newTag: RELEASE.2025-09-07T16-13-09Z
  - name: public.ecr.aws/zinclabs/openobserve
    newTag: v0.80.3

patches:
  - target:
      kind: Deployment
      name: entebus-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: HorizontalPodAutoscaler
      name: entebus-server
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10
  - target:
      kind: Deployment
      name: postgis
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "200m"
            memory: "512Mi"
  - target:
      kind: Deployment
      name: openobserve
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "200m"
            memory: "512Mi"
  - target:
      kind: Deployment
      name: minio
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "100m"
            memory: "256Mi"
  - target:
      kind: Deployment
      name: redis
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
  - target:
      kind: PersistentVolumeClaim
      name: postgis-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi
  - target:
      kind: PersistentVolumeClaim
      name: minio-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi
  - target:
      kind: PersistentVolumeClaim
      name: openobserve-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi
